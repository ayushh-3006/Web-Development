<!doctype html>
<html>
  <head>
    <title>Task 3 - Registration Form</title>
  </head>
  <body>
    <h2>Registration Form</h2>

    <form action="#">
      <label for="fname">First Name :</label>
      <input
        type="text"
        id="fname"
        name="fname"
        placeholder="Enter First Name"
      /><br /><br />

      <label for="lname">Last Name :</label>
      <input
        type="text"
        id="lname"
        name="lname"
        placeholder="Enter Last Name"
      /><br /><br />

      <label for="email">Email :</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter Email Address"
      /><br /><br />

      <label for="pass">Password :</label>
      <input type="password" id="pass" name="pass" /><br /><br />

      <label>Gender:</label><br />
      Male <input type="radio" name="gender" value="male" /><br />
      Female <input type="radio" name="gender" value="female" /><br />
      Other <input type="radio" name="gender" value="other" /><br /><br />

      <label for="age">Age :</label>
      <input type="number" id="age" name="age" /><br /><br />

      <label>Preferences :</label><br />
      Acrylic Painting
      <input type="checkbox" name="pref" value="acrylic" /><br />
      Oil Painting <input type="checkbox" name="pref" value="oil" /><br />
      Water Color Painting
      <input type="checkbox" name="pref" value="watercolor" /><br /><br />

      <label for="occ">Select Occupation</label>
      <select id="occ" name="occupation">
        <option value="student">Student</option>
        <option value="employed">Employed</option>
        <option value="freelancer">Freelancer</option></select
      ><br /><br />

      <label for="bio">Bio</label><br />
      <textarea
        id="bio"
        name="bio"
        rows="5"
        cols="30"
        placeholder="Share few lines about yourself..."
      ></textarea
      ><br /><br />

      <input type="reset" value="RESET" />
      <input type="submit" value="SUBMIT" />
    </form>
  </body>
</html>
