<!doctype html>
<html>
  <body>
    <h2>Application Form</h2>
    <form action="#">
      First Name: <input type="text" name="fname" /> Last Name:
      <input type="text" name="lname" /><br /><br />

      Date of birth: <input type="date" name="dob" /> Age:
      <input type="number" name="age" /><br /><br />

      Gender:
      <select name="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
      Email Address:
      <input
        type="email"
        name="email"
        placeholder="Enter email address"
      /><br /><br />

      Positions Available:
      <input type="radio" name="pos" value="jr" /> Junior Developer
      <input type="radio" name="pos" value="mid" /> Mid-level Developer
      <input type="radio" name="pos" value="sr" /> Senior Developer<br /><br />

      Programming Languages:
      <input type="checkbox" name="lang" value="java" /> Java
      <input type="checkbox" name="lang" value="js" /> JavaScript
      <input type="checkbox" name="lang" value="py" /> Python<br /><br />

      Password: <input type="password" name="pass" /> Confirm Password:
      <input type="password" name="cpass" /><br /><br />

      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
