<!doctype html>
<html>
  <head>
    <title>Pizza Order Form</title>
  </head>
  <body>
    <h2>Task 9:</h2>

    <h1>Pizza Order Form</h1>

    <form>
      <label>First Name:</label>
      <input type="text" /><br /><br />

      <label>Last Name:</label>
      <input type="text" /><br /><br />

      <label>Email Address:</label>
      <input type="email" /><br /><br />

      <label>Contact Number:</label>
      <input type="text" /><br /><br />

      <label>Preferred Delivery Date:</label>
      <input type="text" placeholder="mm/dd/yyyy" /><br /><br />

      <label>Size:</label><br />
      <input type="radio" name="size" /> Small
      <input type="radio" name="size" /> Medium
      <input type="radio" name="size" /> Large<br /><br />

      <label>Flavor:</label><br />
      <input type="checkbox" /> Hawaiian (Php 150.00)
      <select>
        <option>1</option>
        <option>2</option></select
      ><br />

      <input type="checkbox" /> Pepperoni (Php 140.00)
      <select>
        <option>1</option>
        <option>2</option></select
      ><br />

      <input type="checkbox" /> Vegetable (Php 130.00)
      <select>
        <option>1</option>
        <option>2</option></select
      ><br /><br />

      <label>Credit Card Number:</label>
      <input type="text" /><br /><br />

      <label>PIN:</label>
      <input type="password" /><br /><br />

      <label>Additional Note:</label><br />
      <textarea rows="5" cols="40"></textarea><br /><br />

      <input type="submit" value="Submit Order" />
    </form>

  </body>
</html>
