    <!doctype html>
    <html>
      <head>
        <title>Task 2 Form</title>
      </head>
      <body>
        <p>Please enter your personal details:</p>

        <form action="#">
          <label for="fname">First name:*</label>
          <input type="text" id="fname" name="fname" required /><br /><br />

          <label for="lname">Last name:*</label>
          <input type="text" id="lname" name="lname" required /><br /><br />

          <label for="street">Street address:</label>
          <input type="text" id="street" name="street" size="30" /><br /><br />

          <label for="town">Town/city:</label>
          <input type="text" id="town" name="town" /><br /><br />

          <label for="zip">Postcode/zip:</label>
          <input type="text" id="zip" name="zip" size="10" /><br /><br />

          <label for="tel">Telephone:</label>
          <input type="tel" id="tel" name="tel" /><br /><br />

          <label for="mobile">Mobile:</label>
          <input type="tel" id="mobile" name="mobile" /><br /><br />

          <label for="email">Email address:*</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            size="30"
          /><br /><br />

          <small>Fields marked * are required.</small><br /><br />

          <input type="submit" value="Submit" />
        </form>
      </body>
    </html>
  </body>
</html>
