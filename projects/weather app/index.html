<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-info bg-gradient min-vh-100 d-flex flex-column pb-5">
    <header class="navbar navbar-dark bg-dark bg-opacity-75 shadow py-3 mb-5">
      <div
        class="container d-flex justify-content-center align-items-center gap-3"
      >
        <span
          class="navbar-brand mb-0 h1 fs-3 fw-bold text-uppercase tracking-wider"
        >
          Mausam ka Haal
        </span>
        <div class="d-flex gap-2 fs-4">
          <span title="Sunny">🌞</span>
          <span title="Winter">❄️</span>
          <span title="Fog">🌫️</span>
          <span title="Rainy">⛈️</span>
          <span title="Cloudy">⛅</span>
        </div>    
      </div>
    </header>

    <main class="container my-auto">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div
            class="card bg-white bg-opacity-90 border-0 shadow-lg rounded-5 p-4 text-center"
          >
            <div
              class="d-flex align-items-center gap-2 mb-3 text-info-emphasis"
            >
              <i class="bi bi-cloud-sun-fill fs-4"></i>
              <h2 class="fs-5 fw-bold mb-0">Weather Forecast</h2>
            </div>

            <div class="input-group mb-4 shadow-sm rounded-3 overflow-hidden">
              <span class="input-group-text bg-light border-0 text-muted px-3">
                <i class="bi bi-geo-alt-fill text-info"></i>
              </span>
              <input
                type="text"
                name="city"
                id="city"
                placeholder="Enter city name..."
                class="form-control border-0 bg-light ps-1 py-2"
              />
              <button
                class="btn btn-info bg-gradient text-white px-4 fw-bold"
                type="button"
                onclick="getWeather()"
              >
                <i class="bi bi-search me-1"></i> Search
              </button>
            </div>

            <div
              id="WeatherData"
              class="p-3 bg-info-subtle border border-info-subtle rounded-4"
            >
              <div class="w-100 text-info-emphasis">
                
                <div class="py-3">
                  <i class="bi bi-cloud-sun display-3 mb-2 d-block text-info"></i>
                  <h3 class="display-6 fw-bold mb-0">
                    <span id="temperature">--</span>°C
                  </h3>
                </div>

                <div class="row g-2 mt-2">
                  
                  <div class="col-4">
                    <div class="card border-0 bg-white bg-opacity-50 p-2 rounded-3 h-100 shadow-sm">
                      <small class="text-muted d-block text-uppercase font-monospace style-text">Wind</small>
                      <i class="bi bi-wind text-info my-1 fs-5"></i>
                      <span class="fw-bold small d-block"><span id="windSpeed">--</span> <small class="text-muted fw-normal">m/s</small></span>
                    </div>
                  </div>

                  <div class="col-4">
                    <div class="card border-0 bg-white bg-opacity-50 p-2 rounded-3 h-100 shadow-sm">
                      <small class="text-muted d-block text-uppercase font-monospace style-text">Humidity</small>
                      <i class="bi bi-droplet-fill text-info my-1 fs-5"></i>
                      <span class="fw-bold small d-block"><span id="humidity">--</span><small class="text-muted fw-normal">%</small></span>
                    </div>
                  </div>

                  <div class="col-4">
                    <div class="card border-0 bg-white bg-opacity-50 p-2 rounded-3 h-100 shadow-sm">
                      <small class="text-muted d-block text-uppercase font-monospace style-text">Rain (1h)</small>
                      <i class="bi bi-cloud-rain-heavy-fill text-info my-1 fs-5"></i>
                      <span class="fw-bold small d-block"><span id="rain">--</span> <small class="text-muted fw-normal">mm</small></span>
                    </div>
                  </div>

                </div>

                <div>
                  
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
