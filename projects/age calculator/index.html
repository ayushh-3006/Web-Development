<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div
      class="w-25 d-flex flex-column align-items-center gap-2 bg-light rounded shadow border mx-auto mt-5"
    >
      <h1 class="text-center mb-3">age calculator</h1>
      <form>
        <label for="dob"> enter your date of birth</label>
        <input type="date" name="dob" id="dob" class="form-control" />

        <label for="curentdate" class="fw-bold">choose Current Date</label>
        <input
          type="date"
          name="currentdate"
          id="currentdate"
          class="form-control"
        />
        <button type="submit" class="btn btn-primary">calculate age</button>
      </form>

      <div fw-bold text-center>your age is :</div>
    </div>

    <!--  boostrap scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
