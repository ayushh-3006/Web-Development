 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculator</title>

    <!-- Bootstrap CSS -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css">
  </head>

  <body
    class="min-vh-100 d-flex justify-content-center align-items-center overflow-hidden p-2"
  >
    <!-- ================= BG IMAGE ================= -->

    <img
      src="CalculatorBGImage.png"
      alt=""
      class="position-fixed top-0 start-0 w-100 h-100 z-n1 object-fit-cover"
    />

    <!-- ================= CALCULATOR ================= -->

    <div
      class="calc rounded-5 p-2 w-25 shadow-lg d-grid gap-1 col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4"
    >
      <!-- ================= DISPLAY ================= -->

      <input
        type="text"
        id="display"
        value="0"
        readonly
        class="form-control rounded-top-5 rounded-bottom-0 text-end pe-4 fs-2 border border-2 shadow-sm border-dark-subtle py-4 py-md-5 bg-success-subtle"
      />

      <!-- ================= BUTTON AREA ================= -->

      <div
        class="p-3 rounded-bottom-5 bg-danger-subtle border border-2 border-dark-subtle shadow-sm"
      >
        <div class="container-fluid">
          <div class="row g-3">
            <!-- Row 1 -->

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="allClear()"
              >
                AC
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="clearLast()"
              >
                C
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('%')"
              >
                %
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-warning rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('/')"
              >
                /
              </button>
            </div>

            <!-- Row 2 -->

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('7')"
              >
                7
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('8')"
              >
                8
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('9')"
              >
                9
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-warning rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('*')"
              >
                *
              </button>
            </div>

            <!-- Row 3 -->

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('4')"
              >
                4
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('5')"
              >
                5
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('6')"
              >
                6
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-warning rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('-')"
              >
                -
              </button>
            </div>

            <!-- Row 4 -->

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('1')"
              >
                1
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('2')"
              >
                2
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('3')"
              >
                3
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-warning rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('+')"
              >
                +
              </button>
            </div>

            <!-- Row 5 -->

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('0')"
              >
                0
              </button>
            </div>

            <div class="col-3">
              <button
                class="btn btn-light rounded-circle w-100 fs-5 fs-md-3 py-3"
                onclick="appendValue('.')"
              >
                .
              </button>
            </div>

            <div class="col-6">
              <button
                class="btn btn-success rounded-pill w-100 fs-5 fs-md-3 py-3"
                onclick="calculateResult()"
              >
                =
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>
  </body>
</html>
