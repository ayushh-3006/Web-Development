<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Institute Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <form id="registrationForm">
      <div class="container py-5">
        <div class="card shadow-lg">
          <div class="p-4">
            <h1 class="text-center bg-primary text-white p-3 rounded">
              Coaching Institute Registration Form
            </h1>
            <div
              class="d-flex flex-column justify-content-center align-items-center border-bottom pb-5 border-black"
            >
              <h3 class="mt-4 mb-3 text-primary">Personal Information</h3>
              <div class="d-flex flex-column gap-3 w-50 justify-content-center">
                <label for="fullName" class="fw-bold"> Full Name: </label>
                <input
                  type="text"
                  name="fullName"
                  id="fullName"
                  class="form-control"
                  placeholder="Enter Full Name"
                />
                <span
                  class="text-danger small manualError"
                  id="fullNameError"
                ></span>

                <label for="email" class="fw-bold"> Email: </label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter Email Address"
                />
                <span
                  class="text-danger small manualError"
                  id="emailError"
                ></span>

                <label for="number" class="fw-bold"> Mobile Number: </label>
                <input
                  type="tel"
                  name="number"
                  id="number"
                  class="form-control"
                  placeholder="Enter Your Number"
                />
                <span
                  class="text-danger small manualError"
                  id="phoneError"
                ></span>

                <div class="d-flex align-items-center gap-3 flex-wrap">
                  <label class="fw-bold"> Gender: </label>
                  <div class="form-check">
                    <input type="radio" name="gender" id="male" value="Male" />
                    <label for="male"> Male </label>
                  </div>
                  <div class="form-check">
                    <input
                      type="radio"
                      name="gender"
                      id="female"
                      value="Female"
                    />
                    <label for="female" class="form-check-label">
                      Female
                    </label>
                  </div>
                  <div class="form-check">
                    <input
                      type="radio"
                      name="gender"
                      id="other"
                      value="Other"
                    />
                    <label for="other" class="form-check-label"> Other </label>
                  </div>
                </div>
                <span
                  class="text-danger small manualError"
                  id="genderError"
                ></span>

                <label for="DOB" class="fw-bold"> Date Of Birth: </label>
                <input
                  type="date"
                  name="DOB"
                  id="DOB"
                  class="form-control"
                />

                <span
                  class="text-danger small manualError"
                  id="dobError"
                ></span>
              </div>
            </div>

            <div
              class="d-flex flex-column justify-content-center align-items-center border-bottom pb-5 border-black"
            >
              <h3 class="mt-5 mb-3 text-primary">Academic Details</h3>
              <div class="d-flex flex-column gap-3 w-50 justify-content-center">
                <label for="Qualification" class="fw-bold">
                  Last Completed Qualification:
                </label>
                <select
                  name="Qualification"
                  id="Qualification"
                  class="form-select"
                >
                  <option value="">Select Last Completed Qualification</option>
                  <option value="10th">10th</option>
                  <option value="12th">12th</option>
                  <option value="Graduate">Graduate</option>
                  <option value="PostGraduate">PostGraduate</option>
                </select>
                <span
                  class="text-danger small manualError"
                  id="qualificationError"
                ></span>

                <label for="Grade" class="fw-bold">
                  Percentage/Grade in Last Qualification:
                </label>
                <select name="Grade" id="Grade" class="form-select">
                  <option value="">Select Grade in Last Qualification</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                  <option value="D">D</option>
                  <option value="E">E</option>
                  <option value="F">F</option>
                </select>
                <span
                  class="text-danger small manualError"
                  id="gradeError"
                ></span>
              </div>
            </div>

            <div
              class="d-flex flex-column justify-content-center align-items-center border-bottom pb-5 border-black"
            >
              <h3 class="mt-5 mb-3 text-primary">Course Information</h3>
              <div class="d-flex flex-column gap-3 w-50 justify-content-center">
                <label for="Course" class="fw-bold"> Preferred Course: </label>
                <select name="Course" id="Course" class="form-select">
                  <option value="">Select Preferred Course</option>

                  <option value="IIT-JEE">IIT-JEE</option>
                  <option value="NEET">NEET</option>
                  <option value="Banking Exams">Banking Exams</option>
                  <option value="UPSC">UPSC</option>
                </select>
                <span
                  class="text-danger small manualError"
                  id="courseError"
                ></span>

                <label class="fw-bold"> Batch Timing Preference: </label>
                <div class="d-flex gap-4 flex-wrap">
                  <div class="form-check">
                    <input
                      type="checkbox"
                      name="timings"
                      id="Morning"
                      value="Morning"
                    />
                    <label for="Morning" class="form-check-label">
                      Morning
                    </label>
                  </div>
                  <div class="form-check">
                    <input
                      type="checkbox"
                      name="timings"
                      id="Afternoon"
                      value="Afternoon"
                    />
                    <label for="Afternoon" class="form-check-label">
                      Afternoon
                    </label>
                  </div>
                  <div class="form-check">
                    <input
                      type="checkbox"
                      name="timings"
                      id="Evening"
                      value="Evening"
                    />
                    <label for="Evening" class="form-check-label">
                      Evening
                    </label>
                  </div>
                  <div class="form-check">
                    <input
                      type="checkbox"
                      name="timings"
                      id="Weekend"
                      value="Weekend"
                    />
                    <label for="Weekend" class="form-check-label">
                      Weekend
                    </label>
                  </div>
                </div>
                <span
                  class="text-danger small manualError"
                  id="timingsError"
                ></span>
              </div>
            </div>

            <div
              class="d-flex flex-column justify-content-center align-items-center border-bottom pb-5 border-black"
            >
              <h3 class="mt-5 mb-3 text-primary">Address</h3>

              <div class="d-flex flex-column gap-3 w-50 justify-content-center">
                <label for="Address" class="fw-bold">
                  Residential Address:
                </label>

                <textarea
                  name="Address"
                  id="Address"
                  class="form-control"
                  rows="3"
                ></textarea>
                <span
                  class="text-danger small manualError"
                  id="addressError"
                ></span>

                <label for="City" class="fw-bold"> City: </label>
                <input
                  type="text"
                  name="City"
                  id="City"
                  class="form-control"
                  placeholder="Enter Your City"
                />
                <span
                  class="text-danger small manualError"
                  id="cityError"
                ></span>

                <label for="pinCode" class="fw-bold"> Pin Code: </label>
                <input
                  type="number"
                  name="pinCode"
                  id="pinCode"
                  class="form-control"
                  placeholder="Enter Pin Code"
                />
                <span
                  class="text-danger small manualError"
                  id="pinCodeError"
                ></span>
              </div>
            </div>

            <div
              class="d-flex flex-column justify-content-center align-items-center border-bottom pb-5 border-black"
            >
              <h3 class="mt-5 mb-3 text-primary">Guardian Details</h3>
              <div class="d-flex flex-column gap-3 w-50 justify-content-center">
                <label for="guardianName" class="fw-bold">
                  Guardian Full Name:
                </label>
                <input
                  type="text"
                  id="guardianName"
                  class="form-control"
                  placeholder="Enter Guardian Name"
                />
                <span
                  class="text-danger small manualError"
                  id="guardianNameError"
                ></span>

                <label for="guardianNumber" class="fw-bold">
                  Guardian Contact Number:
                </label>
                <input
                  type="tel"
                  id="guardianNumber"
                  class="form-control"
                  placeholder="Enter Guardian Number"
                />
                <span
                  class="text-danger small manualError"
                  id="guardianNumberError"
                ></span>
              </div>
            </div>

            <div
              class="d-flex flex-column justify-content-center align-items-center"
            >
              <h3 class="mt-5 mb-3 text-primary">Additional Information</h3>
              <div class="d-flex flex-column gap-3 w-50 justify-content-center">
                <label for="reference" class="fw-bold">
                  How did you hear about us?
                </label>

                <select id="reference" class="form-select">
                  <option value="">Select Option</option>

                  <option value="Friends">Friends</option>
                  <option value="Online Ad">Online Ad</option>
                  <option value="Newspaper">Newspaper</option>
                  <option value="Social Media">Social Media</option>
                  <option value="Other">Other</option>
                </select>
                <span
                  class="text-danger small manualError"
                  id="referenceError"
                ></span>

                <label for="specialRequirements" class="fw-bold">
                  Special Requirements (Optional):
                </label>
                <textarea
                  id="specialRequirements"
                  class="form-control"
                  rows="3"
                  placeholder="Enter Special Requirements"
                ></textarea>
                <span
                  class="text-danger small manualError"
                  id="specialRequirementsError"
                ></span>
              </div>
            </div>

            <div class="text-center mt-5">
              <button type="submit" class="btn btn-primary px-5 me-3">
                Submit
              </button>
              <button type="reset" class="btn btn-secondary px-5">Reset</button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
