<!DOCTYPE html>
<html lang="en">
<head>
   
</head>
<body>
    <link rel="stylesheet" href="Task1.css">

<div class="container">
    <div class="form-card">
        <h1>Enquiry Form</h1>
        <p class="subtitle">Have questions or need assistance? Fill out the form below to connect with our team and explore your opportunities.</p>

        <form>
            <div class="input-row">
                <div class="field">
                    <label>Person Name*</label>
                    <input type="text" placeholder="Person Name">
                </div>
                <div class="field">
                    <label>Contact Number*</label>
                    <input type="text" placeholder="Contact Number">
                </div>
            </div>

            <div class="input-row">
                <div class="field">
                    <label>Email*</label>
                    <input type="email" placeholder="Email">
                </div>
                <div class="field">
                    <label>Qualification*</label>
                    <input type="text" placeholder="Qualification">
                </div>
            </div>

            <div class="field">
                <label>College/School Name*</label>
                <input type="text" placeholder="College/School Name">
            </div>

            <div class="input-row">
                <div class="field">
                    <label>Year*</label>
                    <select>
                        <option>Year</option>
                    </select>
                </div>
                <div class="field">
                    <label>Branch*</label>
                    <input type="text" placeholder="Branch">
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Now</button>
        </form>
    </div>
</div>

</body>
</html>
